<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajanda | Admin MP3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  <script src="../assets/js/supabase-client.js" defer></script>
  <script src="../assets/js/i18n.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
  <script src="../assets/js/admin/admin.js" defer></script>
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <img src="../assets/MP3LOGO.png" alt="MP3" style="height:40px;width:auto;">
      <span>Admin</span>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="index.html" class="admin-nav-item"><i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i><span>Tablo</span></a>
      <a href="candidats.html" class="admin-nav-item"><i data-lucide="users" style="width:18px;height:18px;"></i><span>Kandida</span></a>
      <a href="actualites.html" class="admin-nav-item"><i data-lucide="newspaper" style="width:18px;height:18px;"></i><span>Nouvèl</span></a>
      <a href="agenda.html" class="admin-nav-item active"><i data-lucide="calendar" style="width:18px;height:18px;"></i><span>Ajanda</span></a>
      <a href="membres.html" class="admin-nav-item"><i data-lucide="user-check" style="width:18px;height:18px;"></i><span>Manm</span></a>
      <a href="dons.html" class="admin-nav-item" data-page="dons">
        <i data-lucide="heart" style="width:18px;height:18px;"></i>
        <span>Don</span>
      </a>
      <a href="../pages/admin/stats.html" class="admin-nav-item" data-page="stats">
        <i data-lucide="bar-chart-3" style="width:18px;height:18px;"></i>
        <span>Statistik</span>
      </a>
      <a href="parametres.html" class="admin-nav-item" data-page="parametres">
        <i data-lucide="settings" style="width:18px;height:18px;"></i>
        <span>Anviwònman</span>
      </a>
    </nav>
    <div class="admin-sidebar-footer">
      <button class="admin-logout-btn" onclick="Auth.signOut()"><i data-lucide="log-out" style="width:16px;height:16px;"></i><span>Dekonekte</span></button>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <div class="admin-header-title"><h1>Ajanda</h1><p>Jere evènman ak rasanbleman MP3</p></div>
      <div class="admin-header-actions">
        <div class="admin-table-search"><input type="text" placeholder="Chèche..."></div>
        <button class="admin-add-btn btn btn-primary btn-sm"><i data-lucide="plus" style="width:16px;height:16px;"></i> Ajoute</button>
        <a href="../index.html" class="btn btn-ghost btn-sm">Retounen</a>
      </div>
    </header>
    <div class="admin-content">
      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead><tr><th>Imaj</th><th>Tit</th><th>Dat</th><th>Kote</th><th>Estati</th><th>Aksyon</th></tr></thead>
          <tbody><tr><td colspan="6" style="text-align:center;padding:2rem;">Chajman...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="admin-modal-overlay"></div>
  <div class="admin-modal">
    <div class="admin-modal-header">
      <h2 class="admin-modal-title">Ajoute Evènman</h2>
      <button class="admin-modal-close">&times;</button>
    </div>
    <div class="admin-modal-body">
      <form class="admin-form">
        <div class="admin-form-grid">
          <div class="admin-form-group"><label>Tit *</label><input type="text" name="title" required></div>
          <div class="admin-form-group"><label>Kote</label><input type="text" name="location"></div>
          <div class="admin-form-group"><label>Dat Kòmansman *</label><input type="datetime-local" name="event_date" required></div>
          <div class="admin-form-group"><label>Dat Finisman</label><input type="datetime-local" name="event_end_date"></div>
          <div class="admin-form-group"><label>URL Kote</label><input type="url" name="location_url" placeholder="https://maps.google.com/..."></div>
          <div class="admin-form-group"><label>Imaj</label><input type="file" name="cover_image_file" accept="image/*"></div>
          <div class="admin-form-group"><label>Kantite Maks Patisipan</label><input type="number" name="max_attendees" min="0"></div>
          <div class="admin-form-group admin-form-checkboxes">
            <label><input type="checkbox" name="is_published"> Pibliye</label>
            <label><input type="checkbox" name="rsvp_enabled"> RSVP Aktive</label>
          </div>
          <div class="admin-form-group full-width"><label>Deskripsyon</label><textarea name="description" rows="4"></textarea></div>
        </div>
        <div class="admin-form-actions">
          <button type="button" class="btn btn-ghost admin-modal-cancel">Anile</button>
          <button type="submit" class="btn btn-primary">Anrejistre</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
      Admin.init('agenda');
    });
  </script>
</body>
</html>
