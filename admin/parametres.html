<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anviwònman | MP3 Admin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  
  <script src="../assets/js/supabase-client.js" defer></script>
  <script src="../assets/js/i18n.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
  <script src="../assets/js/admin/admin.js" defer></script>
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <img src="../assets/MP3LOGO.png" alt="MP3" style="height:40px;width:auto;">
      <span>Admin</span>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="index.html" class="admin-nav-item" data-page="dashboard">
        <i data-lucide="layout-dashboard" style="width: 18px; height: 18px;"></i>
        <span>Tablo</span>
      </a>
      <a href="candidats.html" class="admin-nav-item" data-page="candidats">
        <i data-lucide="users" style="width: 18px; height: 18px;"></i>
        <span>Kandida</span>
      </a>
      <a href="actualites.html" class="admin-nav-item" data-page="actualites">
        <i data-lucide="newspaper" style="width: 18px; height: 18px;"></i>
        <span>Nouvèl</span>
      </a>
      <a href="agenda.html" class="admin-nav-item" data-page="agenda">
        <i data-lucide="calendar" style="width: 18px; height: 18px;"></i>
        <span>Ajanda</span>
      </a>
      <a href="membres.html" class="admin-nav-item" data-page="membres">
        <i data-lucide="user-check" style="width: 18px; height: 18px;"></i>
        <span>Manm</span>
      </a>
      <a href="dons.html" class="admin-nav-item" data-page="dons">
        <i data-lucide="heart" style="width: 18px; height: 18px;"></i>
        <span>Don</span>
      </a>
      <a href="../pages/admin/stats.html" class="admin-nav-item" data-page="stats">
        <i data-lucide="bar-chart-3" style="width: 18px; height: 18px;"></i>
        <span>Statistik</span>
      </a>
      <a href="parametres.html" class="admin-nav-item active" data-page="parametres">
        <i data-lucide="settings" style="width: 18px; height: 18px;"></i>
        <span>Anviwònman</span>
      </a>
    </nav>
    <div class="admin-sidebar-footer">
      <button class="admin-logout-btn" onclick="Auth.signOut()">
        <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
        <span>Dekonekte</span>
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <div class="admin-header-title">
        <h1>Anviwònman</h1>
        <p>Konfigirasyon sit ak peman</p>
      </div>
    </header>

    <div class="admin-content">
      <div class="admin-settings-tabs">
        <button class="admin-settings-tab active" data-tab="general" onclick="switchTab('general')">Jeneral</button>
        <button class="admin-settings-tab" data-tab="payment" onclick="switchTab('payment')">Peman</button>
        <button class="admin-settings-tab" data-tab="bank" onclick="switchTab('bank')">Bank</button>
      </div>

      <div class="admin-settings-content active" id="tab-general" data-tab="general">
        <form class="admin-settings-form">
          <div class="form-group">
            <label class="form-label">Non Pati</label>
            <input type="text" name="party_name" class="form-input" value="Mouvman Pèp pou Pwosperite ak Pwogrè">
          </div>
          <div class="form-group">
            <label class="form-label">Deviz</label>
            <input type="text" name="devise" class="form-input" value="KOMINOTE · EKITE · EFISYANS">
          </div>
          <div class="form-group">
            <label class="form-label">Emèl Kontak</label>
            <input type="email" name="contact_email" class="form-input" value="contact@mp3-ayiti.ht">
          </div>
          <div class="form-group">
            <label class="form-label">Telefòn</label>
            <input type="tel" name="contact_phone" class="form-input" value="+509 00 00 00 00">
          </div>
          <div class="form-group">
            <label class="form-label">Adrès</label>
            <textarea name="contact_address" class="form-textarea">Delmas, Pòtoprens, Ayiti</textarea>
          </div>
          <button type="submit" class="btn btn-primary">Anrejistre</button>
        </form>
      </div>

      <div class="admin-settings-content" id="tab-payment" data-tab="payment" style="display: none;">
        <form class="admin-settings-form">
          <div class="form-group">
            <label class="form-label">Nimewo MonCash</label>
            <input type="tel" name="moncash_number" class="form-input" placeholder="+509...">
          </div>
          <div class="form-group">
            <label class="form-label">Nimewo NatCash</label>
            <input type="tel" name="natcash_number" class="form-input" placeholder="+509...">
          </div>
          <div class="form-group">
            <label class="form-label">Stripe Publishable Key</label>
            <input type="text" name="stripe_publishable_key" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">PayPal Client ID</label>
            <input type="text" name="paypal_client_id" class="form-input">
          </div>
          <button type="submit" class="btn btn-primary">Anrejistre</button>
        </form>
      </div>

      <div class="admin-settings-content" id="tab-bank" data-tab="bank" style="display: none;">
        <form class="admin-settings-form">
          <div class="form-group">
            <label class="form-label">Non Bank</label>
            <input type="text" name="bank_name" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Nimewo Kont</label>
            <input type="text" name="bank_account" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Non Titilè</label>
            <input type="text" name="bank_owner" class="form-input" value="Mouvman Pèp pou Pwosperite ak Pwogrè">
          </div>
          <button type="submit" class="btn btn-primary">Anrejistre</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    function switchTab(tabName) {
      document.querySelectorAll('.admin-settings-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.tab === tabName);
      });
      document.querySelectorAll('.admin-settings-content').forEach(content => {
        content.style.display = content.dataset.tab === tabName ? 'block' : 'none';
        content.classList.toggle('active', content.dataset.tab === tabName);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
      if (window.AdminSettings) AdminSettings.init();
    });
  </script>
</body>
</html>
