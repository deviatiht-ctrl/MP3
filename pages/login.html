<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konekte | MP3</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/auth.css">

  <style>
    .auth-page {
      background: linear-gradient(135deg, var(--clr-black) 0%, #1a1a2e 60%, #16213e 100%);
      min-height: 100vh;
    }
    .auth-container {
      position: relative;
      overflow: visible;
    }
    .auth-container::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(135deg, rgba(201,160,0,0.4), transparent 60%);
      border-radius: inherit;
      z-index: -1;
    }
    .auth-header {
      position: relative;
      background: var(--clr-black);
      padding: var(--space-8) var(--space-8) var(--space-6);
    }
    .auth-back-btn {
      position: absolute;
      top: var(--space-5);
      left: var(--space-5);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: rgba(255,255,255,0.6);
      transition: all 0.2s;
    }
    .auth-back-btn:hover { color: var(--clr-gold); background: rgba(201,160,0,0.1); }
    .auth-body { padding: var(--space-8); }
    .form-group { margin-bottom: var(--space-5); }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--clr-text-secondary); margin-bottom: var(--space-2); text-transform: uppercase; letter-spacing: 0.05em; }
    .auth-input-wrap { position: relative; }
    .auth-input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--clr-text-muted); pointer-events: none; }
    .auth-input-wrap .auth-input { padding-left: 42px; }
    .auth-input-wrap .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--clr-text-muted); cursor: pointer; display: flex; padding: 4px; }
    .auth-error { display: none; background: rgba(220,53,69,0.1); border: 1px solid rgba(220,53,69,0.3); color: #dc3545; border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); font-size: 13px; margin-bottom: var(--space-4); }
    .auth-error.show { display: block; }
    .auth-options { display: flex; justify-content: flex-end; margin-top: -var(--space-2); margin-bottom: var(--space-4); }
    .auth-divider { display: flex; align-items: center; gap: var(--space-4); margin: var(--space-5) 0; color: var(--clr-text-muted); font-size: 12px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--clr-border); }
    .auth-footer { text-align: center; margin-top: var(--space-6); padding-top: var(--space-5); border-top: 1px solid var(--clr-border); font-size: 13px; color: var(--clr-text-secondary); }
    .auth-footer a { color: var(--clr-gold); font-weight: 600; }
  </style>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  
  <script src="../assets/js/supabase-client.js" defer></script>
  <script src="../assets/js/auth.js" defer></script>
</head>
<body>
  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="../index.html" class="auth-back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </a>
        <div class="auth-logo">
          <img src="../assets/MP3LOGO.png" alt="MP3">
        </div>
        <h1 class="auth-title">Byenveni nan MP3</h1>
        <p class="auth-subtitle">Konekte pou aksede ak espas manm ou</p>
      </div>

      <div class="auth-body">
        <div class="auth-error" id="authError"></div>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label>Imèl</label>
            <div class="auth-input-wrap">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input type="email" name="email" class="auth-input" placeholder="ou@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label>Modpas</label>
            <div class="auth-input-wrap">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" name="password" id="passwordInput" class="auth-input" placeholder="••••••••" required>
              <button type="button" class="pw-toggle" id="pwToggle">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="auth-options">
            <a href="#" class="auth-forgot" id="forgotLink">Bliye modpas?</a>
          </div>

          <button type="submit" class="auth-btn" id="loginBtn">Konekte</button>
        </form>

        <div class="auth-divider">oubyen</div>

        <div class="auth-footer">
          <p>Pa gen kont? <a href="devenir-membre.html">Vin Manm MP3</a></p>
          <p style="margin-top: var(--space-2);"><a href="../index.html" style="color: var(--clr-text-muted); font-weight: 400;">← Tounen sou Akèy</a></p>
        </div>
      </div>
    </div>
  </main>

  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();

      const form = document.getElementById('loginForm');
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('authError');
      const pwInput = document.getElementById('passwordInput');
      const pwToggle = document.getElementById('pwToggle');

      pwToggle.addEventListener('click', () => {
        const isText = pwInput.type === 'text';
        pwInput.type = isText ? 'password' : 'text';
      });

      document.getElementById('forgotLink').addEventListener('click', async (e) => {
        e.preventDefault();
        const email = form.querySelector('[name="email"]').value.trim();
        if (!email) { errEl.textContent = 'Antre imèl ou anvan.'; errEl.classList.add('show'); return; }
        const result = await Auth.resetPassword(email);
        if (!result.error) {
          errEl.style.background = 'rgba(25,135,84,0.1)';
          errEl.style.borderColor = 'rgba(25,135,84,0.3)';
          errEl.style.color = '#198754';
          errEl.textContent = 'Nou voye yon imèl pou reyinisyalize modpas ou.';
          errEl.classList.add('show');
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Chajman...';

        const formData = new FormData(form);
        const result = await Auth.signIn(
          formData.get('email'),
          formData.get('password')
        );

        if (!result.error) {
          const urlParams = new URLSearchParams(window.location.search);
          const redirect = urlParams.get('redirect') || 'membre.html';
          window.location.href = redirect;
        } else {
          errEl.textContent = result.error.message === 'Invalid login credentials'
            ? 'Imèl oswa modpas enkòrèk. Eseye ankò.'
            : result.error.message;
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Konekte';
        }
      });
    });
  </script>
</body>
</html>
