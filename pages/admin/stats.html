<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistik Sit | Admin MP3</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/admin.css">
  
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  
  <script src="../../assets/js/supabase-client.js" defer></script>
  <script src="../../assets/js/auth.js" defer></script>
  <script src="../../assets/js/admin/admin.js" defer></script>
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <img src="../../assets/MP3LOGO.png" alt="MP3" style="height:40px;width:auto;">
      <span>Admin</span>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="../../admin/index.html" class="admin-nav-item"><i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i><span>Tablo</span></a>
      <a href="../../admin/candidats.html" class="admin-nav-item"><i data-lucide="users" style="width:18px;height:18px;"></i><span>Kandida</span></a>
      <a href="../../admin/actualites.html" class="admin-nav-item"><i data-lucide="newspaper" style="width:18px;height:18px;"></i><span>Nouvèl</span></a>
      <a href="../../admin/agenda.html" class="admin-nav-item"><i data-lucide="calendar" style="width:18px;height:18px;"></i><span>Ajanda</span></a>
      <a href="../../admin/membres.html" class="admin-nav-item"><i data-lucide="user-check" style="width:18px;height:18px;"></i><span>Manm</span></a>
      <a href="../../admin/dons.html" class="admin-nav-item"><i data-lucide="heart" style="width:18px;height:18px;"></i><span>Don</span></a>
      <a href="stats.html" class="admin-nav-item active"><i data-lucide="bar-chart-3" style="width:18px;height:18px;"></i><span>Statistik</span></a>
      <a href="../../admin/parametres.html" class="admin-nav-item"><i data-lucide="settings" style="width:18px;height:18px;"></i><span>Anviwònman</span></a>
    </nav>
    <div class="admin-sidebar-footer">
      <button class="admin-logout-btn" onclick="Auth.signOut()">
        <i data-lucide="log-out" style="width:16px;height:16px;"></i>
        <span>Dekonekte</span>
      </button>
    </div>
  </aside>

    <main class="admin-main">
      <header class="admin-header">
        <div class="admin-header-title">
          <h1>Statistik Sit</h1>
          <p>Jere chif yo ki afiche sou paj dakwa (Akèy)</p>
        </div>
        <div class="admin-header-actions">
          <a href="../../index.html" class="btn btn-ghost btn-sm"><i data-lucide="home" style="width:16px;height:16px;"></i> Tounen sou Sit la</a>
        </div>
      </header>
      
      <div class="admin-content">
        <div class="stats-grid" id="statsContainer">
          <p>Chajman...</p>
        </div>
        
        <div class="admin-actions" style="margin-top: 2rem;">
          <button class="btn btn-primary" onclick="saveStats()">
            <i data-lucide="save"></i>
            Anrejistre Changement
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
      
      // Check if admin
      const db = await waitForSupabase();
      if (!db) {
        alert('Erè koneksyon');
        return;
      }
      
      const { data: { user } } = await db.auth.getUser();
      if (!user) {
        window.location.href = '../login.html';
        return;
      }
      
      // Check admin access using mp3_admins table
      const { data: adminCheck } = await db
        .from('mp3_admins')
        .select('email')
        .eq('email', user.email)
        .single();
        
      if (!adminCheck) {
        alert('Ou pa gen aksè admin');
        window.location.href = '../../index.html';
        return;
      }
      
      loadStats();
    });
    
    let currentStats = [];
    
    async function loadStats() {
      const db = await waitForSupabase();
      if (!db) return;
      
      const { data, error } = await db
        .from('site_stats')
        .select('*')
        .order('stat_key');
        
      if (error) {
        console.error('Error loading stats:', error);
        document.getElementById('statsContainer').innerHTML = 
          '<p class="error">Erè pandan chajman estatik</p>';
        return;
      }
      
      currentStats = data;
      renderStats(data);
    }
    
    function renderStats(stats) {
      const container = document.getElementById('statsContainer');
      
      container.innerHTML = stats.map(stat => `
        <div class="stat-card">
          <div class="stat-field">
            <label>Kle (Key)</label>
            <input type="text" value="${stat.stat_key}" disabled class="form-input">
          </div>
          <div class="stat-field">
            <label>Vale (Value)</label>
            <input type="number" 
                   id="value-${stat.id}" 
                   value="${stat.stat_value}" 
                   class="form-input stat-value-input">
          </div>
          <div class="stat-field">
            <label>Label (Kreyòl)</label>
            <input type="text" 
                   id="label-ht-${stat.id}" 
                   value="${stat.stat_label_ht || ''}" 
                   class="form-input">
          </div>
          <div class="stat-field">
            <label>Label (Français)</label>
            <input type="text" 
                   id="label-fr-${stat.id}" 
                   value="${stat.stat_label_fr || ''}" 
                   class="form-input">
          </div>
          <div class="stat-field">
            <label>Dènye modifye</label>
            <input type="text" 
                   value="${new Date(stat.updated_at).toLocaleString('fr-FR')}" 
                   disabled class="form-input">
          </div>
        </div>
      `).join('');
    }
    
    async function saveStats() {
      const db = await waitForSupabase();
      if (!db) return;
      
      const updates = currentStats.map(stat => ({
        id: stat.id,
        stat_value: parseInt(document.getElementById(`value-${stat.id}`).value) || 0,
        stat_label_ht: document.getElementById(`label-ht-${stat.id}`).value,
        stat_label_fr: document.getElementById(`label-fr-${stat.id}`).value
      }));
      
      try {
        for (const update of updates) {
          const { error } = await db
            .from('site_stats')
            .update({
              stat_value: update.stat_value,
              stat_label_ht: update.stat_label_ht,
              stat_label_fr: update.stat_label_fr
            })
            .eq('id', update.id);
            
          if (error) throw error;
        }
        
        alert('Estatik yo anrejistre avèk siksè!');
        loadStats(); // Reload to show updated timestamps
      } catch (error) {
        console.error('Error saving stats:', error);
        alert('Erè pandan anrejistreman');
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>
  
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.5rem;
    }
    
    .stat-card {
      background: var(--clr-bg);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
    }
    
    .stat-field {
      margin-bottom: 1rem;
    }
    
    .stat-field:last-child {
      margin-bottom: 0;
    }
    
    .stat-field label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--clr-text-secondary);
      margin-bottom: 0.25rem;
    }
    
    .stat-field input:disabled {
      background: var(--clr-bg-soft);
      color: var(--clr-text-muted);
    }
    
    .stat-value-input {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--clr-gold);
    }
  </style>
</body>
</html>
